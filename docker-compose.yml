services:
  portfel:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfel:latest
    container_name: portfel
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3